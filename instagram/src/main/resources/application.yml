spring:
  application:
    name: instagram

  datasource:
    url: jdbc:h2:mem:instagram
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms

server:
  port: 8080

app:
  feed:
    page-size: 20
    max-cached-feed: 1000
    celebrity-follower-threshold: 100000
    celebrity-lookback-hours: 24
  cache:
    feed-ttl-seconds: 86400
    post-ttl-seconds: 3600
  media:
    max-photo-bytes: 8388608
    max-video-bytes: 4294967296
    cdn-base-url: https://cdn.instagram-clone.example.com
    upload-base-url: https://uploads.instagram-clone.example.com

logging:
  level:
    com.systemdesign.instagram: DEBUG
    org.springframework.web: INFO
