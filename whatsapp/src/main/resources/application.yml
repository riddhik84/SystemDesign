spring:
  application:
    name: whatsapp-messaging

  datasource:
    url: jdbc:h2:mem:whatsapp
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

server:
  port: 8080

logging:
  level:
    com.systemdesign.whatsapp: DEBUG
    org.springframework.web: INFO
    org.springframework.web.socket: DEBUG
