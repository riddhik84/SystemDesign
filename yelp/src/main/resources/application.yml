spring:
  application:
    name: yelp

  datasource:
    url: jdbc:h2:mem:yelp
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms

server:
  port: 8080

app:
  geo:
    default-radius-km: 5.0
    max-radius-km: 40.0
  cache:
    search-ttl-seconds: 300
    business-ttl-seconds: 600
    stars-ttl-seconds: 3600
  search:
    default-page-size: 20
    max-page-size: 100

logging:
  level:
    com.systemdesign.yelp: DEBUG
    org.springframework.web: INFO
