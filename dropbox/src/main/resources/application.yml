spring:
  application:
    name: dropbox

  datasource:
    url: jdbc:postgresql://localhost:5432/dropbox
    username: dropbox
    password: dropbox
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  s3:
    bucket-name: ${S3_BUCKET:dropbox-files}
    region: ${AWS_REGION:us-east-1}
    # Set to http://localhost:4566 to use LocalStack for local development
    endpoint-override: ${S3_ENDPOINT:}
    presigned-url-expiry-minutes: 5
  chunk-size-bytes: 8388608   # 8 MB — S3 minimum part size for multipart is 5 MB
  base-url: ${BASE_URL:http://localhost:8080}

server:
  port: 8080
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
